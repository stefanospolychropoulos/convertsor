<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Professional SOR to Excel Converter</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #00d4ff; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .app-box { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 650px; text-align: center; border: 1px solid #334155; }
        h1 { color: var(--blue); font-size: 24px; margin-bottom: 10px; }
        .drop-zone { border: 2px dashed #475569; padding: 50px 20px; border-radius: 16px; cursor: pointer; transition: 0.3s; background: rgba(15, 23, 42, 0.5); margin: 25px 0; }
        .drop-zone:hover { border-color: var(--blue); background: rgba(0, 212, 255, 0.05); }
        .btn-main { background: linear-gradient(135deg, #00d4ff 0%, #0072ff 100%); color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 18px; box-shadow: 0 10px 15px -3px rgba(0, 212, 255, 0.3); }
        #log { margin-top: 25px; text-align: left; font-family: 'Courier New', monospace; font-size: 12px; color: #94a3b8; max-height: 150px; overflow-y: auto; background: #020617; padding: 15px; border-radius: 10px; }
        .file-count { color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-box">
    <h1>OTDR Data Extractor Pro</h1>
    <p style="color: #94a3b8;">Μετατροπή SOR σε Excel με Events (dB & Reflectance)</p>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p id="label">Σύρετε τα αρχεία .sor εδώ ή κάντε κλικ</p>
        <input type="file" id="file-input" multiple style="display:none" accept=".sor">
    </div>

    <button class="btn-main" onclick="runConversion()">ΕΞΑΓΩΓΗ ΣΕ EXCEL (XLSX)</button>
    <div id="log">Αναμονή αρχείων...</div>
</div>

<script>
    document.getElementById('file-input').onchange = function() {
        document.getElementById('label').innerHTML = `<span class="file-count">${this.files.length}</span> αρχεία επιλέχθηκαν`;
    };

    async function runConversion() {
        const input = document.getElementById('file-input');
        const log = document.getElementById('log');
        if (!input.files.length) return alert("Παρακαλώ επιλέξτε αρχεία πρώτα!");

        log.innerHTML = "Έναρξη ανάλυσης...<br>";
        let excelRows = [];

        for (let file of input.files) {
            try {
                const buffer = await file.arrayBuffer();
                const bytes = new Uint8Array(buffer);
                const view = new DataView(buffer);

                // Universal Finder για τα blocks του αρχείου
                const getBlockPos = (name) => {
                    for (let i = 0; i < bytes.length - name.length; i++) {
                        let match = true;
                        for (let j = 0; j < name.length; j++) {
                            if (bytes[i + j] !== name.charCodeAt(j)) { match = false; break; }
                        }
                        if (match) return i;
                    }
                    return -1;
                };

                let row = { "Όνομα Αρχείου": file.name };

                // 1. Δεδομένα Μέτρησης (FxdParams)
                const fxd = getBlockPos("FxdParams");
                if (fxd !== -1) {
                    row["Wave (nm)"] = view.getUint32(fxd + 2, true) / 1000;
                    row["Pulse (ns)"] = view.getInt32(fxd + 14, true);
                    row["Time (s)"] = view.getInt32(fxd + 18, true);
                    row["Total Dist (m)"] = (view.getUint32(fxd + 26, true) * 0.0001).toFixed(2);
                }

                // 2. Πίνακας Events (KeyEvents)
                const key = getBlockPos("KeyEvents");
                if (key !== -1) {
                    const numEvents = view.getUint16(key + 10, true);
                    let ptr = key + 12;
                    let totalLoss = 0;

                    for (let i = 1; i <= numEvents; i++) {
                        if (ptr + 12 > bytes.length) break;
                        
                        let dist = (view.getUint32(ptr, true) * 0.0001).toFixed(2);
                        let loss = (view.getInt16(ptr + 4, true) * 0.001);
                        let refl = (view.getInt32(ptr + 6, true) * -0.001).toFixed(1);

                        row[`Ev${i} Dist(m)`] = dist;
                        row[`Ev${i} Loss(dB)`] = loss.toFixed(3);
                        row[`Ev${i} Refl(-dB)`] = (refl > 0 && refl < 100) ? "-" + refl : "N/A";
                        
                        totalLoss += loss;
                        ptr += 12;
                    }
                    row["Total Link Loss (dB)"] = totalLoss.toFixed(3);
                }

                excelRows.push(row);
                log.innerHTML += `✅ ${file.name} - OK<br>`;
            } catch (e) {
                log.innerHTML += `❌ Σφάλμα στο ${file.name}<br>`;
            }
        }

        // Δημιουργία και κατέβασμα του Excel
        const worksheet = XLSX.utils.json_to_sheet(excelRows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "OTDR Measurements");
        XLSX.writeFile(workbook, "OTDR_Detailed_Report.xlsx");
        log.innerHTML += "<br><strong>Ολοκληρώθηκε! Το αρχείο κατέβηκε.</strong>";
    }
</script>
</body>
</html>
