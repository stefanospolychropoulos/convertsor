<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SOR to Excel Professional</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .main-card { background: var(--card); padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 600px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h1 { background: linear-gradient(90deg, #00d4ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin-bottom: 10px; }
        .upload-area { border: 2px dashed #334155; border-radius: 16px; padding: 2rem; cursor: pointer; background: rgba(15, 23, 42, 0.5); transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary); }
        .btn-convert { margin-top: 1.5rem; background: linear-gradient(135deg, #00d4ff 0%, #0072ff 100%); color: white; border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        #status { margin-top: 1rem; color: #38bdf8; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>OTDR Data PRO</h1>
    <p style="color: #94a3b8; margin-bottom: 20px;">Universal SOR Parser (EXFO, Viavi, Anritsu)</p>
    
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <p id="file-name">Επιλέξτε αρχεία .sor</p>
        <input type="file" id="file-input" multiple style="display:none" accept=".sor" onchange="updateLabel()">
    </div>

    <button class="btn-convert" onclick="processSor()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
    <div id="status"></div>
</div>

<script>
function updateLabel() {
    const input = document.getElementById('file-input');
    document.getElementById('file-name').innerText = input.files.length + " αρχεία επιλέχθηκαν";
}

async function processSor() {
    const input = document.getElementById('file-input');
    const status = document.getElementById('status');
    if (!input.files.length) return alert("Επιλέξτε αρχεία!");

    status.innerText = "Αναζήτηση δεδομένων... ⏳";
    let results = [];

    for (let file of input.files) {
        try {
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            const view = new DataView(buffer);

            // Λειτουργία εύρεσης θέσης Block (Case Insensitive)
            const findBlock = (name) => {
                const nameBytes = name.split('').map(c => c.charCodeAt(0));
                for (let i = 0; i < bytes.length - nameBytes.length; i++) {
                    let match = true;
                    for (let j = 0; j < nameBytes.length; j++) {
                        if (bytes[i + j] !== nameBytes[j]) { match = false; break; }
                    }
                    if (match) return i;
                }
                return -1;
            };

            let row = { "Αρχείο": file.name };

            // 1. Εύρεση FxdParams (Μήκος)
            const fxdPos = findBlock("FxdParams");
            if (fxdPos !== -1) {
                const distOffset = fxdPos + 26; // Standard Bellcore offset για Total Length
                if (distOffset + 4 <= bytes.length) {
                    const rawDist = view.getUint32(distOffset, true);
                    row["Συνολικό Μήκος (m)"] = (rawDist * 0.0001).toFixed(2);
                }
            }

            // 2. Εύρεση KeyEvents (Events & Loss)
            const keyPos = findBlock("KeyEvents");
            if (keyPos !== -1) {
                const numEvents = view.getUint16(keyPos + 10, true);
                let ptr = keyPos + 12;

                for (let i = 1; i <= numEvents; i++) {
                    if (ptr + 12 > bytes.length) break;
                    let d = view.getUint32(ptr, true) * 0.0001;
                    let l = view.getInt16(ptr + 4, true) * 0.001;
                    let r = view.getInt32(ptr + 6, true) * -0.001;

                    row[`Ev${i} Dist(m)`] = d.toFixed(2);
                    row[`Ev${i} Loss(dB)`] = l.toFixed(3);
                    row[`Ev${i} Refl(dB)`] = (r > 0 && r < 100) ? "-" + r.toFixed(1) : "N/A";
                    ptr += 12;
                }
            }
            results.push(row);
        } catch (e) { console.error(e); }
    }

    if (results.length > 0) {
        const ws = XLSX.utils.json_to_sheet(results);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "OTDR Data");
        XLSX.writeFile(wb, "OTDR_Final_Report.xlsx");
        status.innerText = "Επιτυχία! Το Excel δημιουργήθηκε. ✅";
    } else {
        status.innerText = "Σφάλμα: Δεν βρέθηκαν δεδομένα στα αρχεία. ❌";
    }
}
</script>
</body>
</html>
