<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Universal OTDR SOR Analyzer</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --brand: #00f2fe; --bg: #0a0e14; --card: #161b22; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 40px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1000px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--brand); text-align: center; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        .drop-zone { border: 2px dashed #4facfe; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; background: rgba(79, 172, 254, 0.05); }
        .drop-zone:hover { background: rgba(79, 172, 254, 0.1); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-excel { background: #238636; color: white; }
        .btn-excel:hover { background: #2ea043; }
        #status { margin-top: 20px; padding: 15px; background: #010409; border-radius: 8px; font-family: monospace; font-size: 0.85rem; color: #8b949e; min-height: 50px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>OTDR Professional Data Extractor</h2>
    
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
        <p id="label">Σύρετε ή επιλέξτε αρχεία .sor (Οποιοδήποτε OTDR)</p>
        <input type="file" id="file-input" multiple style="display:none" accept=".sor" onchange="updateInfo(this)">
    </div>

    <div class="btn-group">
        <button class="btn-excel" onclick="startProcessing()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
    </div>

    <div id="status">Αναμονή αρχείων...</div>
</div>

<script>
function updateInfo(input) {
    document.getElementById('label').innerText = input.files.length + " αρχεία έτοιμα για επεξεργασία.";
}

async function startProcessing() {
    const input = document.getElementById('file-input');
    const status = document.getElementById('status');
    if (!input.files.length) return alert("Επιλέξτε αρχεία!");

    status.innerHTML = "Έναρξη ανάλυσης...<br>";
    let finalRows = [];

    for (let file of input.files) {
        try {
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            const view = new DataView(buffer);

            // Universal Block Finder
            function findBlock(name) {
                for (let i = 0; i < bytes.length - name.length; i++) {
                    let match = true;
                    for (let j = 0; j < name.length; j++) {
                        if (bytes[i + j] !== name.charCodeAt(j)) { match = false; break; }
                    }
                    if (match) return i;
                }
                return -1;
            }

            // Text Extractor for Names
            function readString(pos, len) {
                return new TextDecoder().decode(bytes.slice(pos, pos + len)).replace(/\0/g, '').trim();
            }

            let row = { "Όνομα Αρχείου": file.name };

            // 1. Γενικές Πληροφορίες (GenParams)
            let gen = findBlock("GenParams");
            if (gen !== -1) {
                // Η ονομασία της ίνας είναι συνήθως μετά την έκδοση (περίπου +10 bytes)
                row["Fiber ID"] = readString(gen + 10, 20);
            }

            // 2. Ρυθμίσεις Μέτρησης (FxdParams)
            let fxd = findBlock("FxdParams");
            if (fxd !== -1) {
                row["Μήκος Κύματος"] = (view.getUint32(fxd + 2, true) / 1000).toFixed(0) + " nm";
                row["Pulse Width (ns)"] = view.getInt32(fxd + 14, true);
                row["Averaging Time (s)"] = view.getInt32(fxd + 18, true);
                row["Συνολικό Μήκος (m)"] = (view.getUint32(fxd + 26, true) * 0.0001).toFixed(2);
            }

            // 3. Πίνακας Events (KeyEvents)
            let key = findBlock("KeyEvents");
            if (key !== -1) {
                let numEvents = view.getUint16(key + 10, true);
                let totalLoss = 0;
                let ptr = key + 12;

                for (let i = 1; i <= numEvents; i++) {
                    let dist = view.getUint32(ptr, true) * 0.0001;
                    let loss = view.getInt16(ptr + 4, true) * 0.001;
                    let refl = view.getInt32(ptr + 6, true) * -0.001;

                    row[`Ev${i} Dist(m)`] = dist.toFixed(2);
                    row[`Ev${i} Loss(dB)`] = loss.toFixed(3);
                    row[`Ev${i} Refl(dB)`] = (refl > 0 && refl < 100) ? "-" + refl.toFixed(1) : "N/A";
                    
                    if (!isNaN(loss)) totalLoss += loss;
                    ptr += 12;
                }
                row["Συνολικά dB"] = totalLoss.toFixed(3);
            }

            finalRows.push(row);
            status.innerHTML += `✅ Ανάλυση ${file.name} επιτυχής.<br>`;
        } catch (e) {
            status.innerHTML += `❌ Σφάλμα στο ${file.name}.<br>`;
        }
    }

    const ws = XLSX.utils.json_to_sheet(finalRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "OTDR Data");
    XLSX.writeFile(wb, "OTDR_Universal_Report.xlsx");
}
</script>
</body>
</html>
