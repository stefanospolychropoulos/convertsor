<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SOR to Excel PRO</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/otdr-js@1.1.0/dist/otdr.browser.js"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px dashed #8a2be2; padding: 40px; border-radius: 20px; cursor: pointer; }
        .btn { background: #8a2be2; color: white; padding: 15px 40px; border-radius: 50px; border: none; margin-top: 20px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <h1>SOR TO EXCEL (ACCURATE MODE)</h1>
    <div class="box" onclick="document.getElementById('files').click()">
        Σύρετε ή επιλέξτε τα αρχεία .sor
        <input type="file" id="files" multiple style="display:none">
    </div>
    <button class="btn" onclick="convert()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
    <div id="status"></div>

    <script>
        async function convert() {
            const fileInput = document.getElementById('files');
            const status = document.getElementById('status');
            if (fileInput.files.length === 0) return alert("Επιλέξτε αρχεία");

            status.innerText = "Ανάλυση ακριβείας... ⏳";
            const results = [];

            for (const file of fileInput.files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    // Χρήση του επαγγελματικού parser
                    const sor = new otdr.Sor(arrayBuffer);
                    
                    const data = {
                        "Αρχείο": file.name,
                        "Wavelength": sor.fixedParams.wavelength,
                        "Pulse (ns)": sor.fixedParams.pulseWidth,
                        "Total Length (m)": sor.fixedParams.fiberLength.toFixed(2)
                    };

                    // Διάβασμα όλων των Events
                    sor.keyEvents.forEach((ev, i) => {
                        data[`Ev${i+1} Dist(m)`] = ev.distance.toFixed(2);
                        data[`Ev${i+1} Loss(dB)`] = ev.loss.toFixed(3);
                        data[`Ev${i+1} Refl(dB)`] = ev.reflectance.toFixed(1);
                    });

                    results.push(data);
                } catch (e) {
                    console.error("Σφάλμα στο αρχείο " + file.name, e);
                }
            }

            const ws = XLSX.utils.json_to_sheet(results);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "OTDR Data");
            XLSX.writeFile(wb, "OTDR_Correct_Report.xlsx");
            status.innerText = "Ολοκληρώθηκε! ✅";
        }
    </script>
</body>
</html>
