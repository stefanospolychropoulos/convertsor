<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Professional SOR Parser (Universal)</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/otdr-js@1.1.0/dist/otdr.browser.js"></script>
    
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; padding: 40px; }
        .box { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 700px; text-align: center; }
        h2 { color: #58a6ff; }
        .drop-zone { border: 2px dashed #58a6ff; padding: 40px; margin: 20px 0; cursor: pointer; border-radius: 10px; }
        button { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        #log { text-align: left; background: #010409; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h2>OTDR Professional Data Extractor</h2>
    <p>Χρήση εξωτερικού Parser για 100% ακρίβεια</p>
    
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
        <p id="label">Σύρετε τα .sor αρχεία εδώ</p>
        <input type="file" id="file-input" multiple style="display:none" onchange="updateLabel(this)">
    </div>

    <button onclick="processFiles()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
    <div id="log"></div>
</div>

<script>
function updateLabel(input) {
    document.getElementById('label').innerText = input.files.length + " αρχεία επιλέχθηκαν";
}

async function processFiles() {
    const fileInput = document.getElementById('file-input');
    const log = document.getElementById('log');
    if (!fileInput.files.length) return alert("Επιλέξτε αρχεία!");

    log.innerHTML = "Φόρτωση βιβλιοθήκης και ανάλυση...<br>";
    let results = [];

    for (let file of fileInput.files) {
        try {
            const buffer = await file.arrayBuffer();
            
            // Χρήση της βιβλιοθήκης otdr.js για την ανάγνωση
            const sor = new otdr.Sor(buffer);
            
            let data = {
                "Αρχείο": file.name,
                "Fiber ID": sor.generalParams.fiberId || "N/A",
                "Wavelength (nm)": sor.fixedParams.wavelength,
                "Pulse Width (ns)": sor.fixedParams.pulseWidth,
                "Avg Time (s)": sor.fixedParams.averagingTime,
                "Total Length (m)": sor.fixedParams.fiberLength.toFixed(2),
                "Total Loss (dB)": (sor.keyEvents.reduce((acc, ev) => acc + (ev.loss || 0), 0)).toFixed(3)
            };

            // Διάβασμα όλων των Events με Loss & Reflectance
            sor.keyEvents.forEach((ev, i) => {
                data[`Ev${i+1} Dist(m)`] = ev.distance.toFixed(2);
                data[`Ev${i+1} Loss(dB)`] = (ev.loss || 0).toFixed(3);
                data[`Ev${i+1} Refl(dB)`] = ev.reflectance ? ev.reflectance.toFixed(1) : "N/A";
            });

            results.push(data);
            log.innerHTML += `✅ Επιτυχία: ${file.name}<br>`;
        } catch (e) {
            log.innerHTML += `❌ Σφάλμα στο ${file.name}: ${e.message}<br>`;
        }
    }

    const ws = XLSX.utils.json_to_sheet(results);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "OTDR Data");
    XLSX.writeFile(wb, "OTDR_Final_Report.xlsx");
}
</script>
</body>
</html>
