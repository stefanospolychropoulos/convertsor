<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOR Expert Converter</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="module">
        import sorParser from 'https://cdn.skypack.dev/otdr-sor';

        window.processSOR = async () => {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const files = Array.from(fileInput.files);

            if (files.length === 0) return alert("Επιλέξτε αρχεία .sor");

            status.innerHTML = "🔄 Επεξεργασία...";
            const excelRows = [];

            for (const file of files) {
                try {
                    const buffer = await file.arrayBuffer();
                    const rawData = sorParser.parse(buffer);

                    // Εξαγωγή δεδομένων όπως στο Fiberizer
                    const fiberId = rawData.generalParameters.fiberId || "N/A";
                    const wavelength = rawData.fixedParameters.wavelength;
                    const events = rawData.eventTable.events;
                    const lastEvent = events[events.length - 1];

                    excelRows.push({
                        "Αρχείο": file.name,
                        "Fiber ID": fiberId,
                        "Wavelength (nm)": wavelength,
                        "Total Distance (km)": lastEvent.distance.toFixed(4),
                        "Total Loss (dB)": lastEvent.loss.toFixed(3),
                        "Events Count": events.length,
                        "Date": rawData.generalParameters.dateTime
                    });
                } catch (err) {
                    console.error("Error parsing:", file.name, err);
                }
            }

            // Δημιουργία Excel
            const worksheet = XLSX.utils.json_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "OTDR_Report");
            XLSX.writeFile(workbook, "OTDR_Final_Report.xlsx");
            
            status.innerHTML = "✅ Ολοκληρώθηκε! Το Excel κατέβηκε.";
        };
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        input { margin: 20px 0; color: #bbb; }
        button { background: #00e676; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #00c853; transform: scale(1.05); }
        #status { margin-top: 20px; color: #00e676; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SOR ➔ EXCEL PRO</h2>
        <p>Μετατροπή χωρίς Cloud & API</p>
        <input type="file" id="fileInput" accept=".sor" multiple>
        <br>
        <button onclick="processSOR()">ΕΞΑΓΩΓΗ ΤΩΡΑ</button>
        <div id="status"></div>
    </div>
</body>
</html>
