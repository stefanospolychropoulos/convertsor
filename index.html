<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal SOR to Excel Converter</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --main-color: #8a2be2; --bg-color: #0f0f0f; }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; text-align: center; background: #1a1a1a; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(138, 43, 226, 0.3); }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .creator { color: var(--main-color); font-weight: bold; margin-bottom: 30px; font-size: 0.9rem; }
        .drop-zone { border: 3px dashed var(--main-color); border-radius: 15px; padding: 50px; background: rgba(138, 43, 226, 0.05); cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: rgba(138, 43, 226, 0.15); }
        .btn { margin-top: 30px; background: var(--main-color); color: white; border: none; padding: 15px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:hover { transform: scale(1.05); }
        #status { margin-top: 25px; font-family: monospace; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SOR TO EXCEL CONVERTER</h1>
        <div class="creator">PROFESSIONAL VERSION - STANDARDIZED SOR PARSER</div>

        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Σύρετε τα αρχεία .sor εδώ ή κάντε κλικ για επιλογή</p>
            <input type="file" id="file-input" multiple style="display:none">
        </div>

        <button class="btn" onclick="processFiles()">ΜΕΤΑΤΡΟΠΗ ΣΕ EXCEL</button>
        <div id="status"></div>
    </div>

    <script>
        async function processFiles() {
            const fileInput = document.getElementById('file-input');
            const status = document.getElementById('status');
            const files = fileInput.files;

            if (files.length === 0) {
                alert("Παρακαλώ επιλέξτε τουλάχιστον ένα αρχείο .sor");
                return;
            }

            status.innerText = "Ανάλυση αρχείων σε εξέλιξη... ⏳";
            let allData = [];

            for (let file of files) {
                try {
                    const buffer = await file.arrayBuffer();
                    const view = new DataView(buffer);
                    const bytes = new Uint8Array(buffer);

                    // 1. Λειτουργία εύρεσης Block από το MAP του αρχείου
                    const getBlockOffset = (blockName) => {
                        let decoder = new TextDecoder();
                        // Διαβάζουμε τα πρώτα 500 bytes που περιέχουν το Map
                        let header = decoder.decode(bytes.slice(0, 500));
                        let index = header.indexOf(blockName);
                        if (index === -1) return -1;
                        // Το Offset είναι Uint32 αμέσως μετά το όνομα του block και την έκδοση
                        return view.getUint32(index + blockName.length, true);
                    };

                    let row = { "Αρχείο": file.name };

                    // 2. Ανάγνωση FxdParams (Μήκος, Wavelength)
                    let fxdPos = getBlockOffset("FxdParams");
                    if (fxdPos !== -1) {
                        let wave = view.getUint32(fxdPos + 2, true);
                        let rawTotalDist = view.getUint32(fxdPos + 26, true);
                        row["Wavelength"] = (wave / 1000).toFixed(0) + "nm";
                        row["Συνολικό Μήκος (m)"] = (rawTotalDist * 0.0001).toFixed(2);
                    }

                    // 3. Ανάγνωση KeyEvents (Πίνακας Συμβάντων & Loss)
                    let keyPos = getBlockOffset("KeyEvents");
                    if (keyPos !== -1) {
                        let numEvents = view.getUint16(keyPos + 10, true);
                        let ptr = keyPos + 12;

                        for (let i = 1; i <= numEvents; i++) {
                            let dist = view.getUint32(ptr, true) * 0.0001;
                            let loss = view.getInt16(ptr + 4, true) * 0.001;
                            let refl = view.getInt32(ptr + 6, true) * -0.001;

                            row[`Ev${i} Απόσταση(m)`] = dist.toFixed(2);
                            row[`Ev${i} Loss(dB)`] = loss.toFixed(3);
                            row[`Ev${i} Reflect(dB)`] = (refl > 0 && refl < 100) ? "-" + refl.toFixed(1) : "N/A";
                            
                            ptr += 12; // Κάθε event είναι 12 bytes βάσει προτύπου
                        }
                    }

                    allData.push(row);
                } catch (err) {
                    console.error("Σφάλμα στο αρχείο " + file.name, err);
                }
            }

            // Δημιουργία και λήψη του Excel
            const worksheet = XLSX.utils.json_to_sheet(allData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "OTDR_Results");
            XLSX.writeFile(workbook, "OTDR_Universal_Report.xlsx");

            status.innerText = "Η μετατροπή ολοκληρώθηκε επιτυχώς! ✅";
        }
    </script>
</body>
</html>
